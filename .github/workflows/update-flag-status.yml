name: Update Flag Status

on:
  schedule:
    # Poll frequently enough to catch breaking presidential orders quickly.
    # The checker rounds unchanged heartbeats to the hour, so this does not
    # create four commits/deployments per hour when nothing changed.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flag-status-updater
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test status resolver
        run: python -m unittest discover -s tests -v

      - name: Update flag status
        run: python src/api/check_status.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/api/status.json public/api/history.json public/badge.json
            git commit -m "chore: update verified flag status"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
